services:
    app:
      build:
        context: .
        dockerfile: Dockerfile
      volumes:
        - ./tsd:/app/tsd
        - ./tests:/app/tests
        - ./scripts:/app/scripts
        - ./config:/app/config:ro
        - ./data:/app/data
        - ./results:/app/results
        - ./pyproject.toml:/app/pyproject.toml:ro
      environment:
        - TSD_LOG_LEVEL=${TSD_LOG_LEVEL:-INFO}
        - TSD_MARKET=${TSD_MARKET:-omxs30}
        - TSD_INDICATOR_SET=${TSD_INDICATOR_SET:-core}
        - TSD_PIPELINE_MODE=${TSD_PIPELINE_MODE:-ga_only}
        - TSD_GA_N_WORKERS=${TSD_GA_N_WORKERS:-12}
        - TSD_GA_POPULATION_SIZE=${TSD_GA_POPULATION_SIZE:-100}
        - TSD_GA_MAX_GENERATIONS=${TSD_GA_MAX_GENERATIONS:-50}
        - TSD_N_TRIALS=${TSD_N_TRIALS:-100}
        - TSD_FITNESS_MIN_TRADES=${TSD_FITNESS_MIN_TRADES:-10}
        - TSD_FITNESS_MIN_WIN_RATE=${TSD_FITNESS_MIN_WIN_RATE:-0.80}
        - TSD_FITNESS_MIN_RATE=${TSD_FITNESS_MIN_RATE:-0.5}
        - TSD_FITNESS_MAX_RATE=${TSD_FITNESS_MAX_RATE:-2.0}
        - TSD_DATA_DIR=/app/data
        - TSD_RESULTS_DIR=/app/results
        - TSD_CONFIG_DIR=/app/config
        - PYTHONPATH=/app
        - PYTHONDONTWRITEBYTECODE=1
        - PYTHONUNBUFFERED=1
      deploy:
        resources:
          limits:
            cpus: "14"
            memory: 22G
          reservations:
            cpus: "4"
            memory: 8G
      restart: "no"
