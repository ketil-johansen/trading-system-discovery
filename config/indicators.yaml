# Indicator parameter metadata for GA/Optuna search spaces.
# Each indicator defines its category and tunable parameters
# with type, min, max, and default values.

# --- Trend indicators ---
sma:
  category: trend
  params:
    period: { type: int, min: 5, max: 200, default: 20 }

ema:
  category: trend
  params:
    period: { type: int, min: 5, max: 200, default: 20 }

hma:
  category: trend
  params:
    period: { type: int, min: 5, max: 200, default: 20 }

ichimoku:
  category: trend
  params:
    tenkan: { type: int, min: 5, max: 30, default: 9 }
    kijun: { type: int, min: 15, max: 60, default: 26 }
    senkou_b: { type: int, min: 30, max: 120, default: 52 }

supertrend:
  category: trend
  params:
    period: { type: int, min: 5, max: 40, default: 10 }
    multiplier: { type: float, min: 1.0, max: 5.0, default: 3.0 }

# --- Momentum indicators ---
rsi:
  category: momentum
  params:
    period: { type: int, min: 5, max: 30, default: 14 }

stochastic:
  category: momentum
  params:
    k_period: { type: int, min: 5, max: 30, default: 14 }
    d_period: { type: int, min: 3, max: 10, default: 3 }
    smooth_k: { type: int, min: 1, max: 5, default: 3 }

macd:
  category: momentum
  params:
    fast: { type: int, min: 5, max: 20, default: 12 }
    slow: { type: int, min: 15, max: 40, default: 26 }
    signal: { type: int, min: 5, max: 15, default: 9 }

williams_r:
  category: momentum
  params:
    period: { type: int, min: 5, max: 30, default: 14 }

# --- Volatility indicators ---
atr:
  category: volatility
  params:
    period: { type: int, min: 5, max: 30, default: 14 }

bollinger:
  category: volatility
  params:
    period: { type: int, min: 10, max: 50, default: 20 }
    std_dev: { type: float, min: 1.0, max: 4.0, default: 2.0 }

keltner:
  category: volatility
  params:
    ema_period: { type: int, min: 10, max: 50, default: 20 }
    atr_period: { type: int, min: 5, max: 30, default: 10 }
    multiplier: { type: float, min: 1.0, max: 3.0, default: 1.5 }

# --- Volume indicators ---
obv:
  category: volume
  params: {}

cmf:
  category: volume
  params:
    period: { type: int, min: 10, max: 40, default: 20 }

# --- Filters ---
price_vs_ma:
  category: filter
  params:
    ma_period: { type: int, min: 50, max: 300, default: 200 }

volatility_regime:
  category: filter
  params:
    atr_period: { type: int, min: 5, max: 30, default: 14 }
    lookback: { type: int, min: 20, max: 120, default: 60 }
    low_threshold: { type: float, min: 0.5, max: 1.0, default: 0.8 }
    high_threshold: { type: float, min: 1.0, max: 2.0, default: 1.2 }
